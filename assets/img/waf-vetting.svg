<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 440" font-family="ui-monospace, SFMono-Regular, Menlo, monospace">
  <defs>
    <linearGradient id="wbg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/><stop offset="1" stop-color="#161b22"/>
    </linearGradient>
  </defs>
  <rect width="820" height="440" rx="14" fill="url(#wbg)"/>
  <rect x="0" y="0" width="820" height="52" rx="14" fill="#b3541e"/>
  <rect x="0" y="38" width="820" height="14" fill="#b3541e"/>
  <circle cx="26" cy="26" r="6" fill="#ff5f56"/>
  <circle cx="46" cy="26" r="6" fill="#ffbd2e"/>
  <circle cx="66" cy="26" r="6" fill="#27c93f"/>
  <text x="410" y="31" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">Vet for a WAF before you invest a day</text>

  <!-- pre-check box -->
  <text x="34" y="82" fill="#8b949e" font-size="13">The 30-second pre-check on the main asset:</text>
  <rect x="34" y="94" width="752" height="64" rx="8" fill="#11161d" stroke="#30363d"/>
  <text x="50" y="118" fill="#c9d1d9" font-size="13">curl -sI https://target | grep -iE 'server|datadome|cf-|akamai|_px'</text>
  <text x="50" y="140" fill="#c9d1d9" font-size="13">httpx -u https://target -status-code -tech-detect -server</text>

  <!-- branch -->
  <rect x="34" y="184" width="366" height="150" rx="8" fill="#0b1f13" stroke="#238636"/>
  <text x="52" y="210" fill="#3fb950" font-size="14" font-weight="700">CLEAN 200</text>
  <text x="52" y="234" fill="#c9d1d9" font-size="12">normal headers, no bot cookies</text>
  <text x="52" y="256" fill="#c9d1d9" font-size="12">→ good candidate, dig in</text>
  <text x="52" y="286" fill="#8b949e" font-size="12">your tools work: httpx, ffuf,</text>
  <text x="52" y="304" fill="#8b949e" font-size="12">an intercepting proxy, manual</text>
  <text x="52" y="322" fill="#8b949e" font-size="12">API tampering — all fine</text>

  <rect x="420" y="184" width="366" height="150" rx="8" fill="#210f0f" stroke="#f85149"/>
  <text x="438" y="210" fill="#ff7b72" font-size="14" font-weight="700">403 / CHALLENGE</text>
  <text x="438" y="234" fill="#c9d1d9" font-size="12">datadome / __cf_bm / akamai / _px</text>
  <text x="438" y="256" fill="#c9d1d9" font-size="12">"Access is temporarily restricted"</text>
  <text x="438" y="286" fill="#8b949e" font-size="12">it blocks tools, injected JS,</text>
  <text x="438" y="304" fill="#8b949e" font-size="12">AND proxies — even a real</text>
  <text x="438" y="322" fill="#8b949e" font-size="12">browser routed through Burp</text>

  <text x="410" y="372" fill="#f0f6fc" font-size="14" font-weight="700" text-anchor="middle">Early-stage + hardened WAF? Pick a different target.</text>
  <text x="410" y="398" fill="#8b949e" font-size="12.5" text-anchor="middle">The skills travel. Don't burn a week fighting a fortress for a first bug.</text>
  <text x="410" y="420" fill="#6e7681" font-size="11.5" text-anchor="middle">IP-level blocks hit your whole network — switching browsers doesn't help.</text>
</svg>
