  <text x="410" y="31" fill="#ffffff" font-size="17" font-weight="700" text-anchor="middle">Reflected XSS · nothing encoded</text>

  <text x="34" y="92" fill="#8b949e" font-size="13">1 · You type into the search box:</text>
  <rect x="30" y="104" width="760" height="40" rx="8" fill="#010409" stroke="#f0883e"/>
  <text x="46" y="130" font-size="15" fill="#ffa657" font-weight="700">&lt;script&gt;alert(1)&lt;/script&gt;</text>

  <text x="34" y="182" fill="#8b949e" font-size="13">2 · Server drops it into the page HTML — unescaped:</text>
  <rect x="30" y="194" width="760" height="40" rx="8" fill="#010409" stroke="#30363d"/>
  <text x="46" y="220" font-size="14">
    <tspan fill="#6e7681">&lt;h1&gt;0 search results for </tspan><tspan fill="#3fb950" font-weight="700">&lt;script&gt;alert(1)&lt;/script&gt;</tspan><tspan fill="#6e7681">&lt;/h1&gt;</tspan>
  </text>

  <text x="34" y="272" fill="#8b949e" font-size="13">3 · Browser sees a real &lt;script&gt; tag → EXECUTES it:</text>
  <rect x="30" y="284" width="760" height="40" rx="8" fill="#010409" stroke="#30363d"/>
  <text x="46" y="310" font-size="14"><tspan fill="#79c0ff">alert</tspan><tspan fill="#c9d1d9">(</tspan><tspan fill="#ffa657">1</tspan><tspan fill="#c9d1d9">)  </tspan><tspan fill="#6e7681"># popup fires — code ran in the victim's browser</tspan></text>

  <rect x="30" y="352" width="760" height="72" rx="10" fill="#2a1721" stroke="#f85149"/>
  <text x="52" y="380" font-size="15" fill="#ff7b72" font-weight="700">Real-world impact</text>
  <text x="52" y="401" font-size="12.5" fill="#c9d1d9">Swap alert(1) for cookie-stealing JS, send the crafted link to a victim,</text>
  <text x="52" y="418" font-size="12.5" fill="#c9d1d9">and their session is yours — account takeover.</text>
  <text x="700" y="392" font-size="13" fill="#3fb950" font-weight="700" text-anchor="middle">SOLVED &#10003;</text>
